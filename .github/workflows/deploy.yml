name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: false
        default: "all"
        type: choice
        options: [all, backend, frontend]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend → Lambda
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      inputs.target == 'all' ||
      inputs.target == 'backend'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build
        working-directory: backend
        run: GOOS=linux GOARCH=amd64 go build -o bootstrap ./cmd/server/main.go

      - name: Package
        working-directory: backend
        run: zip -j function.zip bootstrap

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lambda
        working-directory: backend
        run: |
          aws lambda update-function-code \
            --function-name teams-aws-backend \
            --zip-file fileb://function.zip \
            --output text --query 'LastModified'
          aws lambda wait function-updated --function-name teams-aws-backend

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend → Cloudflare Workers
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      inputs.target == 'all' ||
      inputs.target == 'frontend'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --silent

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
